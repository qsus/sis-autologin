<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; padding: 15px; display: flex; flex-direction: column; gap: 12px; width: 250px; margin: 0;}
    input[type="text"], input[type="password"], button { padding: 8px; font-size: 14px; }
    .toggle-container { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
    hr { width: 100%; border: 0; border-top: 1px solid #ccc; margin: 5px 0; }
    .section { display: flex; flex-direction: column; gap: 8px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
    .section h2 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: #666; }
  </style>
</head>
<body>
  <section class="section">
    <h2>Auto Session</h2>
    <label class="toggle-container">
      <input type="checkbox" id="enabled">
      Enable AutoLogin
    </label>
    <input type="text" id="url" placeholder="https://your-api.com/auth">
    <input type="text" id="secret" placeholder="Secret Token">
  </section>

  <section class="section">
    <h2>Autofill</h2>
    <input type="text" id="username" placeholder="CAS username">
    <input type="password" id="password" placeholder="CAS password">
    <input type="text" id="otpSeed" placeholder="OTP seed">
    <label class="toggle-container">
      <input type="checkbox" id="registerDevice">
      Register device
    </label>
    <input type="text" id="deviceName" placeholder="Device name">
  </section>

  <button id="save">Save Settings</button>

  <script src="popup.js"></script>
</body>
</html>
