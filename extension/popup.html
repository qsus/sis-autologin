<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; padding: 15px; display: flex; flex-direction: column; gap: 10px; width: 250px; margin: 0;}
    input[type="text"], input[type="password"], button { padding: 8px; font-size: 14px; }
    .toggle-container { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
    hr { width: 100%; border: 0; border-top: 1px solid #ccc; margin: 5px 0; }
  </style>
</head>
<body>
  <label class="toggle-container">
    <input type="checkbox" id="enabled">
    Enable AutoLogin
  </label>
  
  <hr>
  
  <input type="text" id="url" placeholder="https://your-api.com/auth">
  <input type="password" id="secret" placeholder="Secret Token">
  <button id="save">Save Settings</button>

  <script src="popup.js"></script>
</body>
</html>
